<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Cardfolio Showcase</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body { background: #101318; color: #ecf0f6; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; padding: 28px 16px 60px; }
  h1 { font-size: 24px; margin: 0 auto 4px; max-width: 960px; }
  .sub { color: #98a2b4; font-size: 13px; margin: 0 auto 24px; max-width: 960px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; }
  .card .img { position: relative; aspect-ratio: 3/4; background: #181c24; border-radius: 10px; overflow: hidden; }
  .card img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .qty { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.6); border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .card p { font-size: 12px; margin-top: 6px; color: #cdd4e0; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .footer { text-align: center; color: #5b6474; font-size: 12px; margin-top: 40px; }
  .status { text-align: center; color: #98a2b4; margin-top: 80px; font-size: 15px; }
</style>
</head>
<body>
<h1 id="title"></h1>
<p class="sub" id="sub"></p>
<div class="grid" id="grid"></div>
<p class="status" id="status">Loading collection…</p>
<p class="footer">Shared with Cardfolio</p>
<script>
(async function () {
  const DATA_URL = "https://jjjexgftjncllftgzvbu.supabase.co/functions/v1/showcase";
  const status = document.getElementById("status");
  const slug = new URLSearchParams(location.search).get("s");
  if (!slug) { status.textContent = "This showcase link is missing its code."; return; }
  try {
    const res = await fetch(DATA_URL + "?s=" + encodeURIComponent(slug));
    if (!res.ok) { status.textContent = "This showcase doesn't exist or was turned off."; return; }
    const data = await res.json();
    document.title = data.name + " — Cardfolio";
    document.getElementById("title").textContent = data.name;
    document.getElementById("sub").textContent = data.cards.length + " cards";
    const grid = document.getElementById("grid");
    for (const card of data.cards) {
      const el = document.createElement("div");
      el.className = "card";
      const img = document.createElement("div");
      img.className = "img";
      if (card.image) {
        const image = document.createElement("img");
        image.src = card.image;
        image.loading = "lazy";
        image.alt = "";
        img.appendChild(image);
      }
      if (card.quantity > 1) {
        const qty = document.createElement("span");
        qty.className = "qty";
        qty.textContent = "×" + card.quantity;
        img.appendChild(qty);
      }
      const name = document.createElement("p");
      name.textContent = card.name;
      el.appendChild(img);
      el.appendChild(name);
      grid.appendChild(el);
    }
    status.remove();
  } catch (err) {
    status.textContent = "Couldn't load this showcase. Try again in a moment.";
  }
})();
</script>
</body>
</html>
